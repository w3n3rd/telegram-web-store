<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Web Store Starter</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div>
          <h1>Asian shop</h1>
          <p class="hero-copy">
            Do'konimizga
            Xush kelibsiz!
          </p>
        </div>
      </section>

      <section>
        <div class="section-head">
          <div>
            <p class="eyebrow">Mahsulotlar</p>
            <h2>Katalog</h2>
          </div>
          <div class="badge" id="cart-count">Savat: 0 ta</div>
        </div>
        <div class="grid" id="product-list"></div>
      </section>

      <section class="checkout">
        <div class="cart-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Savat</p>
              <h2>Tanlangan mahsulotlar</h2>
            </div>
          </div>
          <div id="cart-items" class="cart-items">
            <p class="empty-state">Hozircha savatda mahsulot yo'q.</p>
          </div>
          <div class="cart-total">
            <span>Jami:</span>
            <strong id="cart-total">0 so'm</strong>
          </div>
        </div>

        <form class="order-form" id="order-form">
          <div class="section-head">
            <div>
              <p class="eyebrow">Buyurtma</p>
              <h2>Ma'lumotlaringizni kiriting</h2>
            </div>
          </div>

          <label>
            Ism familiya
            <input type="text" name="fullName" placeholder="Ali Valiyev" required />
          </label>

          <label>
            Telefon
            <input type="tel" name="phone" placeholder="+998 90 123 45 67" required />
          </label>

          <label>
            Manzil
            <textarea name="address" rows="3" placeholder="Toshkent shahri..." required></textarea>
          </label>

          <label>
            Izoh
            <textarea name="note" rows="3" placeholder="Masalan: 19:00 dan keyin olib keling"></textarea>
          </label>

          <button type="submit" class="primary-btn">Buyurtma yuborish</button>
          <p class="form-message" id="form-message"></p>
        </form>
      </section>
    </main>

    <div class="modal" id="product-modal" aria-hidden="true">
      <div class="modal-backdrop" data-modal-close></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" type="button" data-modal-close aria-label="Yopish">×</button>
        <div class="modal-gallery">
          <img id="modal-main-image" src="" alt="" />
          <div class="modal-thumbs" id="modal-thumbs"></div>
        </div>
        <div class="modal-content">
          <p class="eyebrow" id="modal-category"></p>
          <h2 id="modal-title"></h2>
          <p class="modal-description" id="modal-description"></p>
          <strong class="modal-price" id="modal-price"></strong>
          <button class="primary-btn" type="button" id="modal-add-to-cart">
            Savatga qo'shish
          </button>
        </div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
